<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot Clone Pro - Sound & Confetti</title>
    <!-- Library untuk letupan Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #46178f; color: white; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        .card { background: white; color: #333; border-radius: 12px; padding: 20px; max-width: 600px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        /* Kahoot Colors */
        .opt-0 { background: #e21b3c !important; color: white; }
        .opt-1 { background: #1368ce !important; color: white; }
        .opt-2 { background: #d89e00 !important; color: white; }
        .opt-3 { background: #26890c !important; color: white; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-opt { border: none; padding: 25px 10px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; min-height: 80px; }
        .btn-opt:active { transform: scale(0.95); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-main { background: #26890c; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
        .hidden { display: none; }
        #timer { font-size: 2rem; font-weight: bold; background: white; color: #46178f; width: 70px; height: 70px; line-height: 70px; border-radius: 50%; margin: 10px auto; border: 5px solid #333; transition: 0.3s; }
        .feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: bold; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

<!-- Audio Elements -->
<audio id="snd-correct" src="https://actions.google.com/sounds/v1/cartoon/clink_glasses.ogg"></audio>
<!-- Sound FAHH (Menggunakan bunyi lucu/buzzer yang seakan-akan) -->
<audio id="snd-wrong" src="https://www.myinstants.com/media/sounds/steven-he-failure.mp3"></audio>

<div id="setup-area" class="card">
    <h2 style="color:#46178f">Cipta Kuiz Pro</h2>
    <input type="text" id="quizTitle" placeholder="Tajuk Kuiz (Contoh: Kuiz Lawak)">
    <div id="questionInputs"></div>
    <button class="btn-main" onclick="addQ()">+ Tambah Soalan</button>
    <button class="btn-main" style="background:#1368ce" onclick="generateLink()">Jana Link & Kongsi</button>
    <div id="linkOutput" style="margin-top:20px; word-wrap: break-word;"></div>
</div>

<div id="play-area" class="hidden">
    <h1 id="pTitle">Tajuk</h1>
    <div id="timer">10</div>
    <div class="card">
        <h2 id="pQuestion">Soalan akan muncul...</h2>
        <div class="options-grid" id="pOptions"></div>
    </div>
</div>

<div id="score-area" class="card hidden">
    <h2 style="color:#46178f">TAHNIAH! Selesai!</h2>
    <p>Skor Akhir Anda:</p>
    <h1 id="finalScore" style="font-size: 4rem; color: #26890c;">0</h1>
    <button class="btn-main" onclick="location.href=window.location.pathname">Buat Kuiz Baru</button>
</div>

<div id="feedback-text" class="feedback hidden"></div>

<script>
    let questCount = 0;
    const sndCorrect = document.getElementById('snd-correct');
    const sndWrong = document.getElementById('snd-wrong');

    function addQ() {
        questCount++;
        const div = document.createElement('div');
        div.style.borderBottom = "2px solid #eee";
        div.style.padding = "15px 0";
        div.innerHTML = `
            <input type="text" placeholder="Soalan ${questCount}" class="q-txt">
            <input type="text" placeholder="Jawapan BETUL" class="q-ans" style="border-color: #26890c">
            <input type="text" placeholder="Jawapan Salah 1" class="q-wrong">
            <input type="text" placeholder="Jawapan Salah 2" class="q-wrong">
            <input type="text" placeholder="Jawapan Salah 3" class="q-wrong">
        `;
        document.getElementById('questionInputs').appendChild(div);
    }

    function generateLink() {
        let data = { t: document.getElementById('quizTitle').value || "Kuiz Tanpa Tajuk", q: [] };
        document.querySelectorAll('#questionInputs > div').forEach(d => {
            let correctVal = d.querySelector('.q-ans').value;
            let options = [correctVal, ...Array.from(d.querySelectorAll('.q-wrong')).map(i => i.value)];
            data.q.push({
                s: d.querySelector('.q-txt').value,
                a: correctVal,
                o: options.filter(opt => opt !== "").sort(() => Math.random() - 0.5)
            });
        });
        const str = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const url = window.location.href.split('?')[0] + "?data=" + str;
        document.getElementById('linkOutput').innerHTML = `
            <p>Salin link di bawah:</p>
            <input readonly value="${url}" id="finalUrl">
            <button class="btn-main" style="background:#46178f" onclick="copyText()">Salin Link</button>
        `;
    }

    function copyText() {
        const copyBtn = document.getElementById('finalUrl');
        copyBtn.select();
        navigator.clipboard.writeText(copyBtn.value);
        alert('Link berjaya disalin! Sekarang hantar ke WhatsApp kawan.');
    }

    // GAME LOGIC
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('data')) {
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('play-area').classList.remove('hidden');
        const quiz = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data')))));
        
        let current = 0;
        let score = 0;
        let timeLeft = 10;
        let timer;

        function showFeedback(text, color) {
            const el = document.getElementById('feedback-text');
            el.innerText = text;
            el.style.color = color;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 800);
        }

        function runTimer() {
            timeLeft = 10;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('timer').style.borderColor = "#333";
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 3) document.getElementById('timer').style.borderColor = "red";
                if(timeLeft <= 0) { clearInterval(timer); check('SALAH_MASA_TAMAT'); }
            }, 1000);
        }

        function show() {
            if(current >= quiz.q.length) {
                document.getElementById('play-area').classList.add('hidden');
                document.getElementById('score-area').classList.remove('hidden');
                document.getElementById('finalScore').innerText = score + "/" + quiz.q.length;
                
                // Letupan Confetti!
                var duration = 3 * 1000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
                return;
            }
            runTimer();
            let q = quiz.q[current];
            document.getElementById('pTitle').innerText = quiz.t;
            document.getElementById('pQuestion').innerText = q.s;
            let html = "";
            q.o.forEach((opt, i) => {
                html += `<button class="btn-opt opt-${i}" onclick="check('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
            });
            document.getElementById('pOptions').innerHTML = html;
        }

        window.check = function(ans) {
            clearInterval(timer);
            if(ans === quiz.q[current].a) {
                score++;
                sndCorrect.play();
                showFeedback("BETUL!", "#2ecc71");
            } else {
                sndWrong.play(); // BUNYI FAHH / FAILURE
                showFeedback("FAHH!!", "#e74c3c");
            }
            current++;
            setTimeout(show, 1000);
        }
        show();
    } else {
        addQ(); 
    }
</script>
</body>
</html>
